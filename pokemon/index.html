<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>ぽこポケ図鑑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
*::-webkit-scrollbar{display:none}
*{-ms-overflow-style:none;scrollbar-width:none}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f7f6f2;color:#333;color-scheme:light only}
.header{background:#fff;padding:12px 16px;border-bottom:1px solid #e8e6e0;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:baseline}
.header h1{font-size:18px;font-weight:800}
.header .count{font-size:13px;color:#999;font-weight:600}
.filters{padding:10px 14px 0;background:#f7f6f2;position:sticky;top:47px;z-index:90}
.search-wrap{position:relative}
.search-wrap input{width:100%;padding:9px 34px 9px 12px;font-size:16px;border:1px solid #ddd;border-radius:8px;background:#fff;outline:none;font-family:inherit}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#ccc;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0}
.search-clear span{color:#fff;font-size:13px;font-weight:700;line-height:1}
.tabs{display:flex;gap:6px;margin-top:10px}
.tabs button{flex:1;padding:8px 0;font-size:14px;font-weight:600;cursor:pointer;border:none;border-radius:6px;background:#fff;color:#888;box-shadow:inset 0 0 0 1px #ddd;font-family:inherit}
.tabs button.active{background:#7b8fb5;color:#fff;box-shadow:none}
.env-select{width:100%;padding:8px 10px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fff;outline:none;color:#999;margin-top:10px;font-family:inherit}
.env-select.has-val{color:#333}
.like-toggle{margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.like-toggle button{padding:6px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#666;font-family:inherit}
.like-toggle button.has-filter{background:#e8edf4}
.like-toggle .clear-btn{padding:5px 10px;font-size:12px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;color:#999;font-family:inherit}
.like-buttons{margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;max-height:160px;overflow-y:auto;padding:6px 0;display:none}
.like-buttons.open{display:flex}
.like-buttons button{padding:4px 9px;font-size:12px;border-radius:14px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;font-weight:400;font-family:inherit}
.like-buttons button.active{border:2px solid #7b8fb5;background:#e8edf4;color:#4a5f80;font-weight:600}
.result-bar{margin-top:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.result-bar .num{font-size:13px;color:#999}
.result-bar .clear-all{font-size:12px;color:#7b8fb5;background:none;border:none;cursor:pointer;text-decoration:underline;font-family:inherit;display:none}
.list{padding:0 14px 24px}
.list-inner{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #f0eeea}
.card:last-child{border-bottom:none}
.card-img{width:48px;height:48px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#f8f7f3;border-radius:8px;cursor:pointer}
.card-img img{width:40px;height:40px;image-rendering:pixelated}
.card-img .no-img{width:40px;height:40px;background:#eee;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#ccc}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;color:#333;margin-bottom:3px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.tag-env{font-size:11px;padding:1px 8px;border-radius:4px;background:#f5f4f0;border:1px solid #e0ddd6;color:#777}
.tag-like{font-size:11px;padding:1px 7px;border-radius:10px;background:#f5f4f0;color:#999;font-weight:400}
.tag-like.hl{background:#e8edf4;color:#4a5f80;font-weight:600;border:1px solid #b0bdd0}
.badge{flex-shrink:0;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;background:#e8e6e0;color:#aaa}
.badge.caught{background:#4caf50;color:#fff}
.empty{text-align:center;padding:40px;color:#bbb;font-size:14px}
</style>
</head>
<body>

<div class="header">

    <button id="likeToggleBtn">好きなもので絞り込む ▼</button>
    <button class="clear-btn" id="likeClearBtn" style="display:none">解除</button>

  <div class="like-buttons" id="likeButtons"></div>

  <div class="result-bar">
    <span class="num" id="resultNum"></span>
    <button class="clear-all" id="clearAll">条件をクリア</button>

const STORAGE_KEY="pokopoke-zukan-v1";
let caught={};
try{caught=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");if(!caught||typeof caught!=="object")caught={};}catch(e){caught={};}
function saveCaught(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(caught));}catch(e){}}

// Build env/like sets
const envSet=new Set(), likeSet=new Set();
ALL_DATA.forEach(p=>{
  if(p["好きな環境"])envSet.add(p["好きな環境"]);
  p["好きなもの"].split(",").map(s=>s.trim()).filter(Boolean).forEach(l=>likeSet.add(l));
});
const allEnvs=[...envSet].sort();
const allLikes=[...likeSet].sort();

// State
let searchVal="",envFilter="",likeFilters=new Set(),caughtFilter="all",likesOpen=false;

// Init env select
const envSel=document.getElementById("envSelect");
allEnvs.forEach(e=>{const o=document.createElement("option");o.value=e;o.textContent=e;envSel.appendChild(o);});

// Init like buttons
const likeBtnContainer=document.getElementById("likeButtons");
allLikes.forEach(l=>{
  const b=document.createElement("button");b.textContent=l;b.dataset.val=l;
  b.onclick=()=>{if(likeFilters.has(l))likeFilters.delete(l);else likeFilters.add(l);render();};
  likeBtnContainer.appendChild(b);
});

// Events
document.getElementById("searchInput").oninput=function(){searchVal=this.value;render();};
document.getElementById("searchClear").onclick=()=>{searchVal="";document.getElementById("searchInput").value="";render();};
envSel.onchange=function(){envFilter=this.value;this.classList.toggle("has-val",!!this.value);render();};
document.getElementById("likeToggleBtn").onclick=()=>{likesOpen=!likesOpen;render();};
document.getElementById("likeClearBtn").onclick=()=>{likeFilters.clear();render();};
document.getElementById("clearAll").onclick=()=>{searchVal="";envFilter="";likeFilters.clear();caughtFilter="all";likesOpen=false;document.getElementById("searchInput").value="";envSel.value="";envSel.classList.remove("has-val");render();};
document.querySelectorAll("#caughtTabs button").forEach(b=>{
  b.onclick=()=>{caughtFilter=b.dataset.val;render();};
});

function spriteUrl(name){const id=POKE_ID[name];return id?`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`:null;}

function render(){
  let data=ALL_DATA;
  if(searchVal){const q=searchVal.toLowerCase();data=data.filter(p=>p["名前"].toLowerCase().includes(q));}
  if(envFilter)data=data.filter(p=>p["好きな環境"]===envFilter);
  if(likeFilters.size>0)data=data.filter(p=>{const pl=p["好きなもの"].split(",").map(s=>s.trim());return[...likeFilters].every(f=>pl.includes(f));});
  if(caughtFilter==="caught")data=data.filter(p=>caught[p["名前"]]);
  if(caughtFilter==="uncaught")data=data.filter(p=>!caught[p["名前"]]);

  const caughtCount=ALL_DATA.filter(p=>caught[p["名前"]]).length;
  document.getElementById("headerCount").textContent=caughtCount+"/"+ALL_DATA.length+" 種入手";

  // Tabs
  document.querySelectorAll("#caughtTabs button").forEach(b=>b.classList.toggle("active",b.dataset.val===caughtFilter));

  // Search clear
  document.getElementById("searchClear").style.display=searchVal?"flex":"none";

  // Like toggle btn text
  const ltb=document.getElementById("likeToggleBtn");
  ltb.textContent=likeFilters.size>0?("好きなもの: "+[...likeFilters].join(", ")):"好きなもので絞り込む";
  ltb.textContent+=likesOpen?" ▲":" ▼";
  ltb.classList.toggle("has-filter",likeFilters.size>0);
  document.getElementById("likeClearBtn").style.display=likeFilters.size>0?"inline-block":"none";
  likeBtnContainer.classList.toggle("open",likesOpen);
  likeBtnContainer.querySelectorAll("button").forEach(b=>b.classList.toggle("active",likeFilters.has(b.dataset.val)));

  // Result bar
  document.getElementById("resultNum").textContent=data.length+"匹 表示中";
  const hasFilter=searchVal||envFilter||likeFilters.size>0||caughtFilter!=="all";
  document.getElementById("clearAll").style.display=hasFilter?"inline-block":"none";

  // List
  const list=document.getElementById("pokeList");
  if(data.length===0){list.innerHTML='<div class="empty">該当するポケモンがいません</div>';return;}

  let html="";
  data.forEach(p=>{
    const name=p["名前"];
    const url=spriteUrl(name);
    const env=p["好きな環境"];
    const likes=p["好きなもの"].split(",").map(s=>s.trim()).filter(Boolean);
    const ic=!!caught[name];
    const imgHtml=url?`<img src="${url}" alt="${name}" loading="lazy">`:'<div class="no-img">?</div>';
    const envHtml=env?`<span class="tag-env">${env}</span>`:"";
    const likesHtml=likes.map(l=>`<span class="tag-like${likeFilters.has(l)?" hl":""}">${l}</span>`).join("");
    html+=`<div class="card"><div class="card-img" data-name="${name}">${imgHtml}</div><div class="card-info"><div class="card-name">${name}</div><div class="card-tags">${envHtml}${likesHtml}</div></div><div class="badge${ic?" caught":""}" data-name="${name}">${ic?"入手済":"未入手"}</div></div>`;
  });
  list.innerHTML=html;

  // Attach toggle events
  list.querySelectorAll(".badge,.card-img").forEach(el=>{
    el.onclick=()=>{const n=el.dataset.name;if(caught[n])delete caught[n];else caught[n]=true;saveCaught();render();};
  });
}

render();
</script>
