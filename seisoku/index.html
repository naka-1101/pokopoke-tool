<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{overflow-y:scroll;scrollbar-width:none;color-scheme:light only;}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f5f5;min-height:100vh;-webkit-text-size-adjust:100%;overflow-y:auto;scrollbar-width:none;color-scheme:light only;color:#1a1a1a;}
body::-webkit-scrollbar{display:none;}
.sticky{position:sticky;top:0;z-index:100;background:#f5f5f5;border-bottom:1px solid #e0e0e0;}
.header{padding:10px 14px 4px;display:flex;align-items:center;justify-content:space-between;}
.title{font-size:17px;font-weight:700;color:#1a1a1a;}
.global-stat{font-size:11px;color:#666;}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#f5f5f5;}
.tabs::-webkit-scrollbar{height:0;display:none;}.tabs{scrollbar-width:none;}
.tab{flex:0 0 auto;padding:7px 14px;border:none;border-bottom:3px solid transparent;background:transparent;color:#888;font-weight:500;font-size:13px;cursor:pointer;white-space:nowrap;}
.tab.active{font-weight:700;color:#1a1a1a;}
.controls{padding:10px 14px 0;background:#f5f5f5;}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.prog-info{flex:1;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:3px;}
.prog-labels b{font-weight:700;}
.prog-bar{height:6px;border-radius:3px;background:#e5e7eb;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width .3s;}
.toggle-btn{padding:5px 12px;font-size:12px;font-weight:600;border:1px solid #d1d5db;border-radius:6px;background:#fff;color:#555;cursor:pointer;white-space:nowrap;}
.search-row{display:flex;gap:6px;margin-bottom:8px;}
.search-wrap{flex:1;position:relative;min-width:0;}
.search{width:100%;padding:8px 32px 8px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:16px;outline:none;}
.search-clear-inner{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border:none;background:#ccc;color:#fff;border-radius:50%;font-size:11px;line-height:20px;text-align:center;cursor:pointer;padding:0;}
.search-clear-inner.hidden{visibility:hidden;}
.search-btn{padding:8px 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;font-size:13px;font-weight:600;color:#555;cursor:pointer;white-space:nowrap;}
.filters{display:flex;gap:4px;margin-bottom:0;padding-bottom:10px;background:#f5f5f5;}
.fbtn{padding:6px 0;border:none;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;flex:1;transition:all .15s;}
.list{padding:0 14px 32px;background:#f5f5f5;}
.card{margin-bottom:8px;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0;background:#ffffff;}
.card-header{width:100%;display:flex;align-items:center;gap:8px;padding:10px 12px;border:none;cursor:pointer;text-align:left;font-size:14px;font-weight:600;background:#ffffff;color:#1a1a1a;font-family:inherit;}
.card-header:hover{background:rgba(0,0,0,.02);}
.arrow{font-size:10px;color:#999;transition:transform .2s;flex-shrink:0;}
.arrow.open{transform:rotate(90deg);}
.no-badge{font-size:11px;font-weight:700;color:#fff;padding:2px 8px;border-radius:4px;}
.card-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.comp-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:10px;flex-shrink:0;min-width:60px;text-align:center;height:22px;line-height:16px;}
.comp-done{background:#dcfce7;color:#16a34a;}
.comp-wip{background:#f3f4f6;color:#888;}
.card-body{overflow:hidden;transition:max-height .25s ease,opacity .2s ease,padding .2s ease;}
.card-body.shut{max-height:0;opacity:0;padding:0 12px;}
.card-body.show{max-height:5000px;opacity:1;padding:0 12px 12px;}
.recipe{padding:6px 10px;background:#f9fafb;border-radius:8px;margin-bottom:8px;font-size:13px;color:#555;}
.recipe-label{font-weight:600;color:#888;margin-right:6px;font-size:12px;}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
@media(max-width:400px){.pgrid{grid-template-columns:repeat(2,1fr);}}
.pcell{display:flex;align-items:center;gap:4px;padding:6px 8px;border:1px solid #eee;border-radius:8px;cursor:pointer;transition:all .15s;user-select:none;min-width:0;}
.pcell:hover{border-color:#ccc;}
.pcell.ck{background:#f0fdf4;border-color:#bbf7d0;}
.pcell.ck .pname{color:#16a34a;}
.circle{width:18px;height:18px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.circle.off{border:2px solid #ddd;background:#fff;}
.circle.on{border:2px solid #4ade80;background:#4ade80;}
.psprite{width:32px;height:32px;flex-shrink:0;image-rendering:pixelated;}
.pname{font-size:11px;font-weight:500;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s;}
.empty{text-align:center;padding:32px;color:#999;font-size:14px;}
</style>

function spriteUrl(n){const id=PID[n];return id?"https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/"+id+".png":"";}

let composing=false;
let state={group:"g1",checks:{},search:"",filter:"all",openSet:new Set()};

function loadChecks(){try{const d=localStorage.getItem(SK);if(d)state.checks=JSON.parse(d);}catch{}}
function saveChecks(){try{localStorage.setItem(SK,JSON.stringify(state.checks));}catch{}}
function getGroupHabitats(){return H.filter(h=>GN[state.group]?.has(h.n));}
function getUnique(habs){const s=new Set();habs.forEach(h=>h.p.forEach(p=>s.add(p)));return[...s];}
function getAllUnique(){const s=new Set();H.forEach(h=>h.p.forEach(p=>s.add(p)));return[...s];}

function render(){
  const app=document.getElementById("app");
  const grp=GS.find(g=>g.id===state.group);
  const gHabs=getGroupHabitats();
  const uq=getUnique(gHabs);
  const totalU=uq.length,checkedU=uq.filter(p=>state.checks[p]).length;
  const allUq=getAllUnique();
  const gTotal=allUq.length,gChecked=allUq.filter(p=>state.checks[p]).length;
  const allOpen=gHabs.length>0&&gHabs.every(h=>state.openSet.has(h.n));
  const filtered=gHabs.filter(h=>{
    const q=state.search.toLowerCase();
    const ms=!q||h.nm.toLowerCase().includes(q)||h.p.some(p=>p.toLowerCase().includes(q));
    if(!ms)return false;
    if(state.filter==="done")return h.p.every(p=>state.checks[p]);
    if(state.filter==="undone")return h.p.some(p=>!state.checks[p]);
    return true;
  });
  let html=`<div class="sticky">
    <div class="header"><span class="title">生息地図鑑</span><span class="global-stat">${gChecked}/${gTotal} 種コンプ</span></div>
    <div class="tabs">`;
  GS.forEach(g=>{
    const a=g.id===state.group;
    html+=`<button class="tab${a?" active":""}" style="border-bottom-color:${a?g.color:"transparent"};background:${a?g.color+"15":"transparent"};${a?"color:#1a1a1a;":""}" onclick="switchGroup('${g.id}')">${g.name}</button>`;
  });
  html+=`</div></div>`;
  html+=`<div class="controls">
    <div class="prog-row"><div class="prog-info">
      <div class="prog-labels"><span>エリア進捗</span><b>${checkedU}/${totalU}</b></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${totalU?((checkedU/totalU)*100):0}%;background:${grp.color}"></div></div>
    </div>
    <button class="toggle-btn" onclick="toggleAll()">${allOpen?"すべて閉じる":"すべて開く"}</button>
    </div>
    <div class="search-row">
      <div class="search-wrap">
        <input class="search" id="searchInput" type="text" placeholder="生息地名・ポケモン名で検索" value="${state.search}">
        <button class="search-clear-inner${state.search?"":" hidden"}" onclick="clearSearch()">✕</button>
      </div>
      <button class="search-btn" onclick="execSearch()">検索</button>
    </div>
    <div class="filters">`;
  [["all","すべて"],["done","コンプ済"],["undone","未コンプ"]].forEach(([v,l])=>{
    html+=`<button class="fbtn" style="background:${state.filter===v?grp.color:"#e8e8e8"};color:${state.filter===v?"#fff":"#666"}" onclick="setFilter('${v}')">${l}</button>`;
  });
  html+=`</div></div>`;
  html+=`<div class="list">`;
  if(filtered.length===0){html+=`<div class="empty">該当なし</div>`;}
  filtered.forEach(h=>{
    const isOpen=state.openSet.has(h.n);
    const hDone=h.p.every(p=>state.checks[p]);
    const hCnt=h.p.filter(p=>state.checks[p]).length;
    html+=`<div class="card">
      <button class="card-header" onclick="toggleAcc(${h.n})">
        <span class="arrow${isOpen?" open":""}">▶</span>
        <span class="no-badge" style="background:${grp.color}">No.${h.n}</span>
        <span class="card-name">${h.nm}</span>
        <span class="comp-badge ${hDone?"comp-done":"comp-wip"}">${hDone?"コンプ済":`${hCnt}/${h.p.length}`}</span>
      </button>
      <div class="card-body ${isOpen?"show":"shut"}">
        <div class="recipe"><span class="recipe-label">作り方:</span>${h.r}</div>
        <div class="pgrid">`;
    h.p.forEach((p,i)=>{
      const done=!!state.checks[p];
      const surl=spriteUrl(p);
      html+=`<div class="pcell${done?" ck":""}" onclick="togglePoke('${p.replace(/'/g,"\\'")}')">
        <div class="circle ${done?"on":"off"}">${done?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':""}</div>
        ${surl?`<img class="psprite" src="${surl}" alt="" loading="lazy">`:""}
        <span class="pname">${p}</span>
      </div>`;
    });
    html+=`</div></div></div>`;
  });
  html+=`</div>`;
  app.innerHTML=html;
}

function switchGroup(id){state.group=id;state.search="";state.filter="all";render();}
function togglePoke(name){state.checks[name]=!state.checks[name];saveChecks();render();}
function toggleAcc(n){state.openSet.has(n)?state.openSet.delete(n):state.openSet.add(n);render();}
function toggleAll(){
  const gHabs=getGroupHabitats();
  const allOpen=gHabs.every(h=>state.openSet.has(h.n));
  gHabs.forEach(h=>{allOpen?state.openSet.delete(h.n):state.openSet.add(h.n);});
  render();
}
function execSearch(){const el=document.getElementById("searchInput");if(el){state.search=el.value;render();}}
function clearSearch(){state.search="";render();}
function setFilter(v){state.filter=v;render();}

loadChecks();
render();
</script>
